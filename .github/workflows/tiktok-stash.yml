name: TikTok Stash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Debug token presence
        run: |
          if [ -z "$APIFY_TOKEN" ]; then
            echo "APIFY_TOKEN is NOT set"
            exit 1
          else
            echo "APIFY_TOKEN is set"
          fi

      - name: Run TikTok collector
        run: python main.py

      - name: Normalize archive
        run: python core/normalize.py

      - name: Build search index
        run: python core/build_index.py

      - name: Commit updated archive and UI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ ui/search.html index.html
          if ! git diff --cached --quiet; then
            git commit -m "Update archive [skip ci]"
            git push
          fi

      - name: Upload archive output
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-archive
          path: archive/
