name: TikTok Stash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Ensure folders exist
      - name: Ensure archive structure exists
        run: |
          mkdir -p archive/raw
          mkdir -p archive/derived
          mkdir -p archive/search
          mkdir -p archive/videos

      # Fix Python imports
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD/core" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install ALL deps (including yt-dlp)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      # Step 1: Collect
      - name: Run TikTok collector
        run: python main.py

      # Step 2: Normalize
      - name: Normalize archive
        run: python core/normalize.py

      # Step 3: Download + enrich
      - name: Download videos
        run: python core/download_step.py

      # Step 4: Build index
      - name: Build search index
        run: python core/build_index.py

      # Save everything
      - name: Commit and push archive
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add archive/
          git commit -m "Update archive data (with videos)" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
