name: TikTok Stash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure archive structure exists
        run: |
          mkdir -p archive/raw
          mkdir -p archive/derived
          mkdir -p archive/search
          mkdir -p archive/media

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TikTok collector
        run: python main.py

      - name: Normalize archive
        run: python core/normalize.py

      - name: Download videos
        run: python core/download_step.py

      - name: Build search index
        run: python core/build_index.py

      - name: Commit and push archive
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add archive/
          git commit -m "Update archive data (with videos)" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
