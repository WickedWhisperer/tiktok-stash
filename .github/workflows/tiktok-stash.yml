name: TikTok Stash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          python -m pip install --upgrade pip
          pip install requests

      - run: python main.py

      - run: python core/normalize.py

      - run: python core/build_index.py

      - name: Remove raw data (privacy)
        run: |
          find archive -type f ! -name "search_index.json" -delete

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "update archive [skip ci]"
          git push
