name: TikTok Stash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure folders
        run: |
          mkdir -p archive/raw
          mkdir -p archive/derived
          mkdir -p archive/search
          mkdir -p archive/media
          mkdir -p archive/meta

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Collect
        run: python main.py

      - name: Normalize
        run: python core/normalize.py

      - name: Download + Upload
        run: python core/download_step.py

      - name: Build index
        run: python core/build_index.py

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add archive/
          git commit -m "Full pipeline update (cloud + media)" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
