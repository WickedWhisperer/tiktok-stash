name: TikTok Stash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure archive structure exists
        run: |
          mkdir -p archive/raw
          mkdir -p archive/derived
          mkdir -p archive/search
          mkdir -p archive/media
          mkdir -p archive/system

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Verify rclone
        run: rclone listremotes

      - name: Run collector
        run: python -m main

      - name: Normalize
        run: python -m core.normalize

      - name: Download + Upload + Enrich
        run: python -m core.download_step

      - name: Build index
        run: python -m core.build_index

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add archive/raw archive/derived archive/search
          git commit -m "Update archive (stateful sync)" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
      - name: Verify rclone
        run: rclone listremotes

      - name: Run collector
        run: python main.py

      - name: Normalize
        run: python -m core.normalize

      - name: Download + Upload + Enrich
        run: python -m core.download_step

      - name: Build index
        run: python -m core.build_index

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add archive/
          git commit -m "Update archive (stateful sync)" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
