[Settings]
save_directory = tiktok/
save_type = ALL
check_type = LOG
unsave_after_download = false
process_api = true
process_export = false
ignore_tls_errors = false
source_directory = input/
source_file = None

[Configuration]
client_id = None
client_secret = None
username = None
password = None

[Media]
download_enabled = true
download_videos = true
download_images = true
download_thumbnails = true

[Imgur]
client_id = None

[Recovery]
enabled = true
prefer_cache = true
providers = local,wayback,pullpush,preview,reveddit
max_attempts = 4
timeout_seconds = 15

[Retry]
max_retries = 5
base_retry_delay_seconds = 10
max_retry_delay_seconds = 86400
dead_letter_file = retry_dead_letter.sqlite3

[Storage]
provider = local
remote_directory = /tiktok
local_mirror_directory = mirror/
verify_after_upload = true

[Export]
input_file = None
