<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>TikTok Stash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./stash.css">
<style>
  body { font-family: 'Nunito', -apple-system, 'Helvetica Neue', sans-serif; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="top-bar">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#161616"/>
          <path d="M31 14c.8 3.4 3.4 6 6 6.8v4.8c-2.2-.1-4.3-.8-6-2.2v10c0 5.5-4.5 10-10 10S11 38.9 11 33.4s4.5-10 10-10c.7 0 1.3.1 2 .2v4.9c-.6-.2-1.3-.3-2-.3-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5V14h5z" fill="url(#tg)"/>
          <defs>
            <linearGradient id="tg" x1="11" y1="14" x2="37" y2="44" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#25f4ee"/>
              <stop offset="50%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#fe2c55"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="brand-name">STASH</span>
      </div>

      <div class="search-bar">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </span>
        <input
          id="searchInput"
          type="search"
          placeholder="Search videos, #hashtags, @authors…"
          autocomplete="off"
          spellcheck="false"
        >
        <button class="search-clear" id="searchClear" type="button" aria-label="Clear search">×</button>
      </div>

      <div class="header-actions">
        <div class="mode-tabs">
          <button class="mode-tab active" id="gridModeTab" type="button">Grid</button>
          <button class="mode-tab" id="feedModeTab" type="button">Feed</button>
        </div>

        <button class="pill" id="reloadBtn" type="button" title="Reload index from server">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
          Reload
        </button>

        <button class="pill" id="clearBtn" type="button" style="display:none">
          Clear filters
        </button>
      </div>
    </div>

    <div class="filter-bar">
      <select id="authorFilter" class="pill">
        <option value="">All authors</option>
      </select>

      <select id="sortSelect" class="pill">
        <option value="likes">Most liked</option>
        <option value="views">Most viewed</option>
        <option value="comments">Most commented</option>
        <option value="shares">Most shared</option>
        <option value="favorites">Most favorited</option>
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
      </select>

      <select id="dateFilter" class="pill">
        <option value="">Any time</option>
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 3 months</option>
        <option value="365">Last year</option>
      </select>

      <div class="meta-row" style="margin-left:auto;flex-shrink:0">
        <div class="meta-left">
          <div class="live-dot" id="liveDot"></div>
          <span id="cacheStatus" style="font-size:12px;color:var(--muted)">Loading</span>
          <span style="font-size:12px;color:var(--muted)">·</span>
          <span id="resultsMeta" style="font-size:12px;font-weight:700;color:var(--text)">—</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="progress-rail" id="progressRail">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="body-offset">
  <div class="banner-slot">
    <div class="banner-box warn hidden" id="offlineBanner">
      <span><strong>Offline mode</strong> — showing cached data. Videos may not play.</span>
      <button class="banner-dismiss" type="button" onclick="this.closest('.banner-box').classList.add('hidden')">×</button>
    </div>
    <div class="banner-box error hidden" id="errorBanner">
      <span id="errorMsg"></span>
    </div>
  </div>

  <div class="tag-strip" id="tagStrip"></div>

  <div class="recent-panel hidden" id="recentPanel" style="margin-top:12px">
    <div class="recent-label">Recent searches</div>
    <div class="recent-chips" id="recentChips"></div>
  </div>

  <div class="analytics-panel hidden" id="analyticsWrap" style="margin-top:12px"></div>

  <div class="skeleton-grid hidden" id="skeletonWrap" style="margin-top:12px">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>

  <div class="grid-view hidden" id="gridView" style="margin-top:12px">
    <div class="video-grid" id="videoGrid"></div>
  </div>
</div>

<div class="feed-view hidden" id="feedView">
  <div class="feed-spacer-top" id="feedSpacerTop"></div>
  <div id="feedItems"></div>
  <div class="feed-spacer-bottom" id="feedSpacerBot"></div>
</div>

<button class="back-top hidden" id="backTop" type="button" aria-label="Back to top">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
    <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6 1.41 1.41z"/>
  </svg>
</button>

<button class="surprise-btn" id="surpriseBtn" type="button" aria-label="Random video">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.65 3.35A7.958 7.958 0 0012 1C7.03 1 3 5.03 3 10s4.03 9 9 9c4.07 0 7.5-2.71 8.58-6.43l-1.94-.52C17.75 14.9 15.07 17 12 17c-3.87 0-7-3.13-7-7s3.13-7 7-7c1.93 0 3.68.79 4.95 2.05L14 8h7V1l-3.35 2.35z"/>
    <circle cx="12" cy="10" r="2"/>
  </svg>
  <span>Surprise me</span>
</button>

<script src="./stash.js"></script>
</body>
</html>
