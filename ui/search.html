<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TikTok Stash</title>
<link rel="stylesheet" href="./stash.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════
     PROGRESS BAR (global, sits above everything)
     ═════════════════════════════════════════════ -->
<div id="progress"></div>
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════
     APP CONTAINER
     ═════════════════════════════════════════════ -->
<div id="app">

  <!-- ─────────────────────────────────────────────
       VIEW: GRID
       ───────────────────────────────────────────── -->
  <div id="view-grid">

    <!-- HEADER -->
    <header class="gh" id="gh">

      <!-- Row 1: logo + search + reload -->
      <div class="gh-top">
        <div class="logo">
          <!-- TikTok-style SVG logo -->
          <svg class="logo-svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <rect width="48" height="48" rx="12" fill="#111"/>
            <path d="M31 14c.8 3.4 3.4 6 6 6.8v4.8c-2.2-.1-4.3-.8-6-2.2v10
                     c0 5.5-4.5 10-10 10S11 38.9 11 33.4s4.5-10 10-10
                     c.7 0 1.3.1 2 .2v4.9c-.6-.2-1.3-.3-2-.3-2.8 0-5 2.2-5 5
                     s2.2 5 5 5 5-2.2 5-5V14h5z"
                  fill="url(#ttg)"/>
            <defs>
              <linearGradient id="ttg" x1="11" y1="14" x2="37" y2="44" gradientUnits="userSpaceOnUse">
                <stop offset="0%"  stop-color="#25f4ee"/>
                <stop offset="45%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#fe2c55"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">STASH</span>
        </div>

        <!-- Search -->
        <div class="search-pill">
          <span class="sp-icon" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </span>
          <input
            id="search-inp"
            type="search"
            placeholder="Search videos, #tags, @authors…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search archive"
          >
          <button class="sp-clear" id="search-clear" type="button" aria-label="Clear search">×</button>
        </div>

        <!-- Reload -->
        <button class="fc" id="btn-reload" type="button" aria-label="Reload archive index" style="flex-shrink:0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.65 6.35A7.96 7.96 0 0012 4C7.58 4 4 7.58 4 12s3.58 8 8 8
                     c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6
                     s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
      </div>

      <!-- Row 2: filter chips -->
      <div class="gh-filters" id="filter-row" role="toolbar" aria-label="Filters">

        <label class="fc">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
          <select id="author-sel" aria-label="Filter by author">
            <option value="">All authors</option>
          </select>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
        </label>

        <label class="fc">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>
          </svg>
          <select id="sort-sel" aria-label="Sort by">
            <option value="likes">Most liked</option>
            <option value="views">Most viewed</option>
            <option value="comments">Most commented</option>
            <option value="shares">Most shared</option>
            <option value="favorites">Most favorited</option>
            <option value="date_desc">Newest first</option>
            <option value="date_asc">Oldest first</option>
          </select>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
        </label>

        <label class="fc">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14
                     c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/>
          </svg>
          <select id="date-sel" aria-label="Time range">
            <option value="">Any time</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90">Last 3 months</option>
            <option value="365">Last year</option>
          </select>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
        </label>

      </div>

      <!-- Active tag area -->
      <div id="tag-area" class="gh-filters" style="padding-top:0" aria-live="polite"></div>

    </header><!-- /gh -->

    <!-- Banners (inside grid view) -->
    <div class="banner warn u-hide" id="off-banner">
      <span><strong>Offline</strong> — showing cached data. Videos may not stream.</span>
      <button class="banner-close" id="off-dismiss" type="button" aria-label="Dismiss">×</button>
    </div>

    <div class="banner error u-hide" id="err-banner">
      <span id="err-msg"></span>
      <button class="banner-close" id="err-dismiss" type="button" aria-label="Dismiss">×</button>
    </div>

    <!-- Scrollable body -->
    <div class="grid-scroll" id="grid-scroll">

      <!-- Status bar -->
      <div class="grid-status" id="g-status">
        <span class="gs-count" id="g-count">—</span>
        <span class="gs-net">
          <span class="net-dot" id="net-dot"></span>
          <span id="net-lbl" style="font-size:11px;color:var(--c-muted)">Loading…</span>
        </span>
      </div>

      <!-- Recent searches -->
      <section class="recent-searches u-hide" id="recent-sect" aria-label="Recent searches">
        <span class="rs-label">Recent searches</span>
        <div class="rs-chips" id="recent-chips"></div>
      </section>

      <!-- Analytics panel (collapsible) -->
      <section class="analytics u-hide" id="analytics" aria-label="Archive analytics">
        <div class="analytics-header">
          <span class="analytics-title">Archive at a glance</span>
          <span class="analytics-chevron" id="an-chevron" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/>
            </svg>
          </span>
        </div>
        <div class="analytics-body collapsed" id="an-body">
          <div class="analytics-body" id="an-metrics" style="padding:0;margin-bottom:8px"></div>
        </div>
        <div class="top-tags-row" id="top-tags"></div>
      </section>

      <!-- Skeleton -->
      <div class="skel-grid" id="skel-wrap">
        <div class="skel-item"></div><div class="skel-item"></div><div class="skel-item"></div>
        <div class="skel-item"></div><div class="skel-item"></div><div class="skel-item"></div>
        <div class="skel-item"></div><div class="skel-item"></div><div class="skel-item"></div>
      </div>

      <!-- Video grid -->
      <main class="video-grid" id="video-grid" aria-label="Video archive"></main>

    </div><!-- /grid-scroll -->

  </div><!-- /view-grid -->

  <!-- ─────────────────────────────────────────────
       VIEW: FEED (fixed fullscreen, hides in grid)
       ───────────────────────────────────────────── -->
  <div id="view-feed" class="u-hide" aria-label="Video feed">
    <div id="feed-sp-top" class="feed-spacer"></div>
    <div id="feed-items"></div>
    <div id="feed-sp-bot" class="feed-spacer"></div>
  </div>

</div><!-- /app -->

<!-- ═══════════════════════════════════════════════
     BOTTOM NAVIGATION
     ═════════════════════════════════════════════ -->
<nav id="bottom-nav" aria-label="Main navigation">
  <button class="nav-item" id="nav-feed" type="button" aria-label="Feed">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    Feed
  </button>

  <button class="nav-item active" id="nav-browse" type="button" aria-label="Browse">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M3 3h8v8H3zm0 10h8v8H3zm10-10h8v8h-8zm0 10h8v8h-8z"/>
    </svg>
    Browse
  </button>

  <!-- Centre shuffle/surprise button -->
  <div class="nav-center">
    <button class="nav-plus" id="nav-shuffle" type="button" aria-label="Surprise me — random video">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#000" aria-hidden="true">
        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
      </svg>
    </button>
  </div>

  <button class="nav-item" id="nav-export" type="button" aria-label="Export archive">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
    </svg>
    Export
  </button>

  <button class="nav-item" id="nav-settings" type="button" aria-label="Settings" onclick="alert('Settings — coming soon')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7 7 0 00-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
    </svg>
    Settings
  </button>
</nav>

<!-- Back to top FAB (grid only) -->
<button class="fab" id="btn-top" type="button" aria-label="Back to top">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
  </svg>
</button>

<!-- ═══════════════════════════════════════════════
     EXPORT BOTTOM SHEET
     ═════════════════════════════════════════════ -->
<div class="sheet-overlay" id="export-sheet" role="dialog" aria-label="Export options" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle" role="presentation"></div>
    <div class="sheet-title">Export archive</div>

    <button class="sheet-row" id="ex-json" type="button">
      <div class="sheet-row-icon blue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
        </svg>
      </div>
      <div>
        <div class="sheet-row-text">Export as JSON</div>
        <div class="sheet-row-sub">Full metadata for current filtered view</div>
      </div>
    </button>

    <button class="sheet-row" id="ex-csv" type="button">
      <div class="sheet-row-icon green">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M15.5 2H8.6L7 3.6V10h2V4h5v4h4v12H7v-2H5v4h14V5.5L15.5 2zM5 11.5l-2.5 3 2.5 3v-2H9v-2H5v-2zm4.5 4l2.5-3-2.5-3v2H6v2h3.5v2z"/>
        </svg>
      </div>
      <div>
        <div class="sheet-row-text">Export as CSV</div>
        <div class="sheet-row-sub">Stats table for spreadsheets</div>
      </div>
    </button>

    <button class="sheet-row" id="ex-links" type="button">
      <div class="sheet-row-icon cyan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
        </svg>
      </div>
      <div>
        <div class="sheet-row-text">Copy all public links</div>
        <div class="sheet-row-sub">One URL per line · respects current filter</div>
      </div>
    </button>

    <button class="sheet-row" id="ex-cancel" type="button" style="justify-content:center;border-top:.5px solid var(--c-border)">
      <div class="sheet-row-text" style="color:var(--c-muted)">Cancel</div>
    </button>
  </div>
</div>

<script src="./stash.js"></script>
</body>
</html>
