<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Stash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090909;
    --surface: #111111;
    --surface-2: #151515;
    --card: #161616;
    --border: #242424;
    --border-2: #2e2e2e;
    --pink: #ff2d55;
    --cyan: #00f2ea;
    --text: #f3f3f3;
    --muted: #8b8b8b;
    --soft: #b7b7b7;
    --good: #39d98a;
    --warn: #ffcc00;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at top, rgba(0,242,234,0.08), transparent 30%),
      radial-gradient(circle at bottom right, rgba(255,45,85,0.08), transparent 24%),
      var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.55;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(16px);
    background: rgba(9,9,9,0.88);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 18px;
    display: grid;
    gap: 14px;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    user-select: none;
  }

  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2.4px;
    line-height: 1;
    background: linear-gradient(90deg, var(--cyan), var(--pink));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-subtitle {
    font-size: 11px;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .search-wrap {
    flex: 1;
    min-width: min(100%, 260px);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
  }

  .search {
    position: relative;
  }

  .search input {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px 14px 44px;
    font-size: 14px;
    outline: none;
    transition: border-color .18s, box-shadow .18s, transform .18s;
  }

  .search input:focus {
    border-color: rgba(0,242,234,0.7);
    box-shadow: 0 0 0 4px rgba(0,242,234,0.08);
  }

  .search svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: .5;
    pointer-events: none;
  }

  .toolbar {
    display: grid;
    gap: 10px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  select, .toggle, .mini-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 12px;
    padding: 10px 14px;
    font: inherit;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .18s;
  }

  select:focus, .toggle:focus, .mini-btn:focus {
    border-color: rgba(0,242,234,0.7);
  }

  .toggle.active, .mini-btn.active {
    background: rgba(0,242,234,0.1);
    border-color: rgba(0,242,234,0.42);
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
  }

  .status {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    color: var(--muted);
    font-size: 12px;
  }

  .badge {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    padding: 6px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .badge.good { color: var(--good); }
  .badge.warn { color: var(--warn); }
  .badge.cyan { color: var(--cyan); }

  .results {
    max-width: 1280px;
    margin: 0 auto;
    padding: 18px;
  }

  .loading, .empty, .error {
    min-height: 48vh;
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--muted);
  }

  .skeleton-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .skeleton {
    height: 430px;
    border-radius: 22px;
    background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    background-size: 300% 100%;
    animation: shimmer 1.2s infinite;
    border: 1px solid var(--border);
  }

  @keyframes shimmer {
    0% { background-position: 0 0; }
    100% { background-position: 100% 0; }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .feed {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    max-width: 980px;
    margin: 0 auto;
  }

  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    transition: transform .18s, border-color .18s;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--border-2);
  }

  .card.feed-mode {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 78vh;
    scroll-snap-align: start;
  }

  .media {
    position: relative;
    background: #000;
    aspect-ratio: 9 / 16;
    overflow: hidden;
  }

  .feed-mode .media {
    aspect-ratio: 9 / 16;
    max-height: 82vh;
  }

  .player {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #000;
  }

  .poster {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: saturate(1.05);
    opacity: .82;
  }

  .poster::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.38));
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 14px;
    pointer-events: none;
  }

  .overlay-top,
  .overlay-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    pointer-events: auto;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    overflow: hidden;
    background: linear-gradient(135deg, var(--pink), var(--cyan));
    flex: 0 0 auto;
    display: grid;
    place-items: center;
    color: #000;
    font-weight: 800;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.14);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .handle {
    display: flex;
    flex-direction: column;
    min-width: 0;
    gap: 2px;
  }

  .handle a {
    color: var(--text);
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .handle .date {
    font-size: 11px;
    color: rgba(255,255,255,0.76);
  }

  .play-state {
    background: rgba(0,0,0,0.44);
    color: white;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 10px;
    border-radius: 999px;
    font-size: 12px;
    backdrop-filter: blur(8px);
  }

  .info {
    display: grid;
    gap: 10px;
    padding: 14px 14px 16px;
    background: rgba(0,0,0,0.08);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .caption {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    word-break: break-word;
  }

  .caption mark {
    background: rgba(255,45,85,0.26);
    color: #fff;
    padding: 0 3px;
    border-radius: 3px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--soft);
    font-size: 12px;
    text-decoration: none;
  }

  .chip.cyan { color: var(--cyan); }
  .chip.pink { color: var(--pink); }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .stat {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--soft);
    font-size: 12px;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .18s, transform .18s, background .18s;
  }

  .btn:hover {
    transform: translateY(-1px);
    border-color: rgba(0,242,234,0.4);
    background: rgba(255,255,255,0.04);
  }

  .btn.primary {
    background: rgba(0,242,234,0.1);
    border-color: rgba(0,242,234,0.35);
  }

  .btn.pink {
    background: rgba(255,45,85,0.12);
    border-color: rgba(255,45,85,0.34);
  }

  .status-line {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .status-pill {
    font-size: 11px;
    padding: 6px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: rgba(255,255,255,0.02);
  }

  .status-pill.good { color: var(--good); }
  .status-pill.warn { color: var(--warn); }
  .status-pill.cyan { color: var(--cyan); }

  .feed-shell {
    scroll-snap-type: y proximity;
  }

  .feed-shell .card {
    min-height: 84vh;
  }

  .feed-shell .info {
    padding-bottom: 18px;
  }

  .offline-banner, .error-banner {
    max-width: 1280px;
    margin: 12px auto 0;
    padding: 0 18px;
  }

  .banner {
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    color: var(--soft);
    font-size: 13px;
    line-height: 1.5;
  }

  .banner strong { color: var(--text); }

  .hidden { display: none !important; }

  @media (min-width: 980px) {
    .meta-row {
      align-items: flex-start;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-inner">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-title">STASH</div>
          <div class="brand-subtitle">TikTok Archive</div>
        </div>

        <div class="search-wrap">
          <div class="search">
            <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="M21 21l-4.35-4.35"></path>
            </svg>
            <input id="searchInput" type="text" placeholder="Search captions, hashtags, authors, music, mentions…" autocomplete="off">
          </div>

          <div class="controls">
            <button class="toggle active" id="gridModeBtn" type="button">Grid</button>
            <button class="toggle" id="feedModeBtn" type="button">Feed</button>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <div class="controls">
          <select id="authorFilter">
            <option value="">All authors</option>
          </select>

          <select id="sortSelect">
            <option value="likes">↓ Most liked</option>
            <option value="views">↓ Most viewed</option>
            <option value="comments">↓ Most commented</option>
            <option value="shares">↓ Most shared</option>
            <option value="favorites">↓ Most favorited</option>
            <option value="date_desc">↓ Newest first</option>
            <option value="date_asc">↑ Oldest first</option>
          </select>

          <select id="dateFilter">
            <option value="">Any time</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90">Last 3 months</option>
            <option value="365">Last year</option>
          </select>

          <button class="mini-btn" id="refreshBtn" type="button">Refresh</button>
        </div>

        <div class="meta-row">
          <div class="status" id="statusBar">
            <span class="badge cyan" id="resultsMeta">Loading…</span>
            <span class="badge" id="modeMeta">Grid mode</span>
            <span class="badge" id="cacheMeta">Cache inactive</span>
          </div>
          <div class="status">
            <span class="badge good" id="publicLinkMeta">Public links enabled</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="offline-banner hidden" id="offlineBanner">
    <div class="banner">
      <strong>Offline mode:</strong> showing cached archive data. Video playback may fall back to posters or open-link buttons until the network comes back.
    </div>
  </div>

  <div class="error-banner hidden" id="errorBanner">
    <div class="banner" id="errorBox"></div>
  </div>

  <main class="results">
    <div class="loading" id="loadingState">
      <div>
        <div class="skeleton-grid" aria-hidden="true">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
        <p style="margin-top:14px;">Loading archive…</p>
      </div>
    </div>

    <section id="resultsShell" class="grid hidden"></section>
  </main>
</div>

<script>
const DATA_URL = '../archive/search/search_index.json';
const CACHE_NAME = 'tiktok-stash-ui-v2';
const MODE_KEY = 'tiktok-stash-ui-mode-v2';

let allItems = [];
let filteredItems = [];
let currentMode = localStorage.getItem(MODE_KEY) || 'grid';
let activeObserver = null;
let activePlayingVideo = null;

const els = {
  loadingState: document.getElementById('loadingState'),
  resultsShell: document.getElementById('resultsShell'),
  searchInput: document.getElementById('searchInput'),
  authorFilter: document.getElementById('authorFilter'),
  sortSelect: document.getElementById('sortSelect'),
  dateFilter: document.getElementById('dateFilter'),
  resultsMeta: document.getElementById('resultsMeta'),
  modeMeta: document.getElementById('modeMeta'),
  cacheMeta: document.getElementById('cacheMeta'),
  errorBanner: document.getElementById('errorBanner'),
  errorBox: document.getElementById('errorBox'),
  offlineBanner: document.getElementById('offlineBanner'),
  gridModeBtn: document.getElementById('gridModeBtn'),
  feedModeBtn: document.getElementById('feedModeBtn'),
  refreshBtn: document.getElementById('refreshBtn')
};

function escHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escAttr(value) {
  return escHtml(value).replace(/`/g, '&#96;');
}

function fmt(n) {
  const num = Number(n);
  if (!Number.isFinite(num) || num < 0) return '—';
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
  if (num >= 1_000) return (num / 1_000).toFixed(1) + 'K';
  return String(num);
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('en-GB', {
      day: 'numeric',
      month: 'short',
      year: 'numeric'
    });
  } catch {
    return '';
  }
}

function initials(name) {
  const s = String(name || '?').trim();
  if (!s) return '?';
  return s.slice(0, 2).toUpperCase();
}

function normalizeList(value) {
  if (!value) return [];
  if (Array.isArray(value)) {
    return value.map(v => {
      if (typeof v === 'string') return v.trim();
      if (v && typeof v === 'object') {
        return (v.name || v.title || v.text || v.username || v.id || '').toString().trim();
      }
      return '';
    }).filter(Boolean);
  }
  if (typeof value === 'string') return value.trim() ? [value.trim()] : [];
  if (value && typeof value === 'object') {
    const c = value.name || value.title || value.text || value.username || value.id;
    return c ? [String(c)] : [];
  }
  return [];
}

function highlight(text, query) {
  const safe = escHtml(text || '');
  const q = String(query || '').trim();
  if (!q) return safe;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  try {
    return safe.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  } catch {
    return safe;
  }
}

function getStat(item, key) {
  const direct = item?.[key];
  if (direct != null && Number.isFinite(Number(direct))) return Number(direct);

  const stats = item?.stats || {};
  const aliases = {
    likes: ['likes', 'diggCount', 'digg'],
    views: ['views', 'playCount'],
    comments: ['comments', 'commentCount'],
    shares: ['shares', 'shareCount'],
    favorites: ['favorites', 'collectCount'],
    reposts: ['reposts', 'repostCount']
  };

  for (const candidate of aliases[key] || [key]) {
    if (stats[candidate] != null && Number.isFinite(Number(stats[candidate]))) {
      return Number(stats[candidate]);
    }
  }
  return 0;
}

function isHttpUrl(value) {
  return typeof value === 'string' && /^https?:\/\//i.test(value);
}

function getPlaybackUrl(item) {
  if (isHttpUrl(item?.public_link_url)) return item.public_link_url;
  if (isHttpUrl(item?.video_storage_url)) return item.video_storage_url;
  return '';
}

function getOpenUrl(item) {
  return getPlaybackUrl(item) || item?.url || '#';
}

function getStorageLabel(item) {
  return item?.video_storage_path || item?.metadata_storage_path || '';
}

async function loadCachedIndex() {
  if (!('caches' in window)) return [];
  try {
    const cache = await caches.open(CACHE_NAME);
    const cached = await cache.match(DATA_URL);
    if (!cached) return [];
    const data = await cached.json();
    return Array.isArray(data) ? data : [];
  } catch {
    return [];
  }
}

async function saveIndexCache(items) {
  if (!('caches' in window)) return;
  try {
    const cache = await caches.open(CACHE_NAME);
    await cache.put(
      DATA_URL,
      new Response(JSON.stringify(items), {
        headers: { 'Content-Type': 'application/json' }
      })
    );
    els.cacheMeta.textContent = 'Cache updated';
  } catch {
    els.cacheMeta.textContent = 'Cache limited';
  }
}

function setMode(mode) {
  currentMode = mode === 'feed' ? 'feed' : 'grid';
  localStorage.setItem(MODE_KEY, currentMode);

  els.gridModeBtn.classList.toggle('active', currentMode === 'grid');
  els.feedModeBtn.classList.toggle('active', currentMode === 'feed');
  els.modeMeta.textContent = currentMode === 'feed' ? 'Feed mode' : 'Grid mode';

  if (currentMode === 'feed') {
    els.resultsShell.classList.remove('grid');
    els.resultsShell.classList.add('feed', 'feed-shell');
  } else {
    els.resultsShell.classList.remove('feed', 'feed-shell');
    els.resultsShell.classList.add('grid');
  }

  render();
}

function populateAuthors() {
  const authors = [...new Set(allItems.map(item => item.author).filter(Boolean))].sort((a, b) => a.localeCompare(b));
  const selected = els.authorFilter.value;
  els.authorFilter.innerHTML = '<option value="">All authors</option>';
  authors.forEach(author => {
    const opt = document.createElement('option');
    opt.value = author;
    opt.textContent = '@' + author;
    els.authorFilter.appendChild(opt);
  });
  els.authorFilter.value = selected;
}

function applyFilters() {
  const query = els.searchInput.value.trim().toLowerCase();
  const author = els.authorFilter.value;
  const sort = els.sortSelect.value;
  const days = parseInt(els.dateFilter.value, 10) || 0;

  let items = [...allItems];

  if (query) {
    items = items.filter(item => (item.search_text || '').includes(query));
  }

  if (author) {
    items = items.filter(item => item.author === author);
  }

  if (days) {
    const cutoff = Date.now() - (days * 86400000);
    items = items.filter(item => {
      if (!item.created_at) return false;
      const ts = new Date(item.created_at).getTime();
      return Number.isFinite(ts) && ts >= cutoff;
    });
  }

  items.sort((a, b) => {
    if (sort === 'date_desc') return new Date(b.created_at || 0) - new Date(a.created_at || 0);
    if (sort === 'date_asc') return new Date(a.created_at || 0) - new Date(b.created_at || 0);
    return getStat(b, sort) - getStat(a, sort);
  });

  filteredItems = items;
  return items;
}

function videoStatusPills(item) {
  const pills = [];
  const download = item.download_status || 'unknown';
  const upload = item.upload_status || 'unknown';
  const verify = item.verification_status || 'unknown';
  const pub = item.public_link_status || 'unknown';

  pills.push(`<span class="status-pill ${download === 'completed' ? 'good' : download === 'failed' ? 'warn' : ''}">Download: ${escHtml(download)}</span>`);
  pills.push(`<span class="status-pill ${upload === 'completed' ? 'good' : upload === 'failed' ? 'warn' : ''}">Upload: ${escHtml(upload)}</span>`);
  pills.push(`<span class="status-pill ${verify === 'verified' ? 'good' : verify === 'failed' ? 'warn' : ''}">Verify: ${escHtml(verify)}</span>`);
  pills.push(`<span class="status-pill ${pub === 'created' ? 'good' : pub === 'failed' ? 'warn' : ''}">Link: ${escHtml(pub)}</span>`);
  if (item.is_available === false) {
    pills.push(`<span class="status-pill warn">Unavailable</span>`);
  }
  return pills.join('');
}

function buildCard(item, idx, query) {
  const playback = getPlaybackUrl(item);
  const openUrl = getOpenUrl(item);
  const poster = item.video_cover_url || item.music_cover || '';
  const feedClass = currentMode === 'feed' ? 'feed-mode' : '';
  const avatarUrl = item.author_avatar || '';
  const authorUrl = item.author_profile || `https://www.tiktok.com/@${encodeURIComponent(item.author || 'unknown')}`;
  const musicUrl = item.music_url || '';
  const tiktokUrl = item.url || '#';

  const hashtags = normalizeList(item.hashtags);
  const mentions = normalizeList(item.mentions);
  const detailedMentions = Array.isArray(item.detailed_mentions) ? item.detailed_mentions : [];

  const musicTitle = item.music_name || '';
  const musicAuthor = item.music_author || '';
  const dateText = formatDate(item.created_at);
  const caption = item.caption || '';

  const stats = [
    ['likes', getStat(item, 'likes')],
    ['views', getStat(item, 'views')],
    ['comments', getStat(item, 'comments')],
    ['shares', getStat(item, 'shares')],
    ['favorites', getStat(item, 'favorites')],
    ['reposts', getStat(item, 'reposts')]
  ];

  const storageLabel = getStorageLabel(item);
  const storageChip = storageLabel
    ? `<span class="chip">Storage: ${escHtml(storageLabel)}</span>`
    : '';

  const mentionLinks = mentions.map(m => {
    const clean = String(m).replace(/^@/, '').trim();
    if (!clean) return '';
    return `<a class="chip pink" href="https://www.tiktok.com/@${encodeURIComponent(clean)}" target="_blank" rel="noopener">@${escHtml(clean)}</a>`;
  }).join('');

  const detailedMentionLinks = detailedMentions
    .map(m => {
      if (!m || typeof m !== 'object') return '';
      const user = m.username || m.userUniqueId || m.unique_id || m.name || '';
      const clean = String(user).replace(/^@/, '').trim();
      return clean
        ? `<a class="chip" href="https://www.tiktok.com/@${encodeURIComponent(clean)}" target="_blank" rel="noopener">@${escHtml(clean)}</a>`
        : '';
    })
    .filter(Boolean)
    .join('');

  const hashtagChips = hashtags.map(h => `<span class="chip cyan">#${escHtml(String(h).replace(/^#/, ''))}</span>`).join('');

  return `
    <article class="card ${feedClass}" data-id="${escAttr(item.id || idx)}">
      <div class="media">
        <div class="poster" data-poster="${escAttr(poster)}" ${poster ? `style="background-image:url('${escAttr(poster)}')"` : ''}></div>
        <video
          class="player archive-video"
          muted
          playsinline
          loop
          controls
          preload="metadata"
          poster="${escAttr(poster)}"
          data-src="${escAttr(playback)}"
          data-index="${idx}"
          data-id="${escAttr(item.id || idx)}"
        ></video>

        <div class="overlay">
          <div class="overlay-top">
            <div style="display:flex;align-items:center;gap:10px;min-width:0;">
              <div class="avatar">
                ${avatarUrl ? `<img src="${escAttr(avatarUrl)}" alt="${escAttr(item.author || 'author')}" loading="lazy">` : escHtml(initials(item.author))}
              </div>
              <div class="handle">
                <a href="${escAttr(authorUrl)}" target="_blank" rel="noopener">@${escHtml(item.author || 'unknown')}</a>
                <div class="date">${escHtml(dateText)}</div>
              </div>
            </div>
            <div class="play-state">${currentMode === 'feed' ? 'Feed autoplay' : 'Grid preview'}</div>
          </div>

          <div class="overlay-bottom">
            <div class="status-line">
              ${videoStatusPills(item)}
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
              ${musicUrl ? `<a class="btn" href="${escAttr(musicUrl)}" target="_blank" rel="noopener">Music</a>` : ''}
              ${playback ? `<a class="btn primary" href="${escAttr(openUrl)}" target="_blank" rel="noopener">Open video</a>` : `<a class="btn primary" href="${escAttr(tiktokUrl)}" target="_blank" rel="noopener">Open TikTok</a>`}
            </div>
          </div>
        </div>
      </div>

      <div class="info">
        <div class="caption">${highlight(caption, query)}</div>

        <div class="chips">
          ${hashtagChips}
          ${mentionLinks}
          ${detailedMentionLinks}
          ${musicTitle ? `<a class="chip" href="${escAttr(musicUrl || tiktokUrl)}" target="_blank" rel="noopener">🎵 ${highlight(musicTitle, query)}${musicAuthor ? ' · ' + escHtml(musicAuthor) : ''}</a>` : ''}
          ${storageChip}
        </div>

        <div class="stats">
          ${stats.map(([name, value]) => `<span class="stat">${escHtml(name)}: ${fmt(value)}</span>`).join('')}
        </div>

        <div class="actions">
          ${playback ? `<button class="btn pink copy-link-btn" type="button" data-copy="${escAttr(playback)}">Copy public link</button>` : ''}
          ${storageLabel ? `<button class="btn" type="button" data-copy="${escAttr(storageLabel)}">Copy storage path</button>` : ''}
          <a class="btn" href="${escAttr(tiktokUrl)}" target="_blank" rel="noopener">Open TikTok</a>
          ${item.public_link_url ? `<a class="btn" href="${escAttr(item.public_link_url)}" target="_blank" rel="noopener">Public link</a>` : ''}
        </div>
      </div>
    </article>
  `;
}

function cleanupVideos() {
  document.querySelectorAll('.archive-video').forEach(video => {
    try {
      video.pause();
    } catch {}
  });
}

function setupPlayback() {
  if (activeObserver) {
    activeObserver.disconnect();
    activeObserver = null;
  }

  const videos = [...document.querySelectorAll('.archive-video')];
  if (!videos.length) return;

  activeObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const video = entry.target;
      const src = video.getAttribute('data-src');
      const poster = video.getAttribute('poster') || '';
      const posterEl = video.closest('.card')?.querySelector('.poster');

      if (entry.isIntersecting && src && !video.getAttribute('src')) {
        video.src = src;
        video.load();
      }

      if (currentMode === 'feed') {
        if (entry.intersectionRatio >= 0.65 && src) {
          if (activePlayingVideo && activePlayingVideo !== video) {
            try { activePlayingVideo.pause(); } catch {}
          }
          activePlayingVideo = video;
          try {
            video.muted = true;
            video.playsInline = true;
            const p = video.play();
            if (p && typeof p.catch === 'function') p.catch(() => {});
          } catch {}
        } else if (entry.intersectionRatio < 0.35) {
          try { video.pause(); } catch {}
        }
      }

      if (posterEl && poster) {
        posterEl.style.opacity = entry.isIntersecting ? '0.18' : '0.82';
      }
    });
  }, {
    root: null,
    threshold: [0.1, 0.35, 0.65, 0.8],
    rootMargin: '450px 0px'
  });

  videos.forEach(video => {
    video.addEventListener('error', () => {
      const card = video.closest('.card');
      if (card) {
        const poster = card.querySelector('.poster');
        if (poster) poster.style.opacity = '1';
        video.style.display = 'none';
      }
    });
    activeObserver.observe(video);
  });

  if (currentMode === 'feed') {
    const firstVideo = document.querySelector('.archive-video');
    if (firstVideo) {
      setTimeout(() => {
        try {
          firstVideo.play().catch(() => {});
        } catch {}
      }, 250);
    }
  } else {
    cleanupVideos();
  }
}

function setupCopyButtons() {
  document.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const value = btn.getAttribute('data-copy');
      if (!value) return;

      try {
        await navigator.clipboard.writeText(value);
        const prev = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = prev; }, 900);
      } catch {
        alert('Copy failed');
      }
    });
  });
}

function render() {
  const items = applyFilters();
  els.resultsMeta.textContent = `${items.length} video${items.length === 1 ? '' : 's'}`;
  els.modeMeta.textContent = currentMode === 'feed' ? 'Feed mode' : 'Grid mode';

  if (!items.length) {
    els.resultsShell.innerHTML = `
      <div class="empty">
        <div>
          <h2 style="margin:0 0 10px 0;color:var(--text);">No results found</h2>
          <p style="margin:0;">Try changing the search, filters, or feed mode.</p>
        </div>
      </div>
    `;
    setupPlayback();
    setupCopyButtons();
    return;
  }

  els.resultsShell.innerHTML = items.map((item, idx) => buildCard(item, idx, els.searchInput.value.trim())).join('');
  setupPlayback();
  setupCopyButtons();
}

async function loadData() {
  els.loadingState.classList.remove('hidden');
  els.resultsShell.classList.add('hidden');
  els.errorBanner.classList.add('hidden');

  try {
    const response = await fetch(DATA_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status} — archive not found`);
    const data = await response.json();
    if (!Array.isArray(data)) throw new Error('search_index.json is not an array');

    allItems = data;
    await saveIndexCache(data);
    els.offlineBanner.classList.add('hidden');
  } catch (err) {
    const cached = await loadCachedIndex();
    if (cached.length) {
      allItems = cached;
      els.offlineBanner.classList.remove('hidden');
      els.cacheMeta.textContent = 'Cache used';
    } else {
      els.errorBanner.classList.remove('hidden');
      els.errorBox.innerHTML = `<strong>Could not load archive</strong><br>${escHtml(err.message)}<br><br>Make sure <code>archive/search/search_index.json</code> exists in the repo and GitHub Pages is serving the site from the repository root.`;
      els.loadingState.classList.add('hidden');
      return;
    }
  }

  populateAuthors();
  render();
  els.loadingState.classList.add('hidden');
  els.resultsShell.classList.remove('hidden');
}

function wireEvents() {
  const rerender = () => render();

  els.searchInput.addEventListener('input', rerender);
  els.authorFilter.addEventListener('change', rerender);
  els.sortSelect.addEventListener('change', rerender);
  els.dateFilter.addEventListener('change', rerender);

  els.gridModeBtn.addEventListener('click', () => setMode('grid'));
  els.feedModeBtn.addEventListener('click', () => setMode('feed'));
  els.refreshBtn.addEventListener('click', () => loadData());

  window.addEventListener('online', () => {
    els.offlineBanner.classList.add('hidden');
    els.cacheMeta.textContent = 'Online';
  });

  window.addEventListener('offline', () => {
    els.offlineBanner.classList.remove('hidden');
    els.cacheMeta.textContent = 'Offline';
  });
}

function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

setMode(currentMode);
wireEvents();
registerServiceWorker();
loadData();
</script>
</body>
</html>
